spring:
  application:
    name: fcfs-draw-service
  datasource:
    url: jdbc:h2:mem:fcfsdraw;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  charset:
    console: UTF-8
    file: UTF-8
