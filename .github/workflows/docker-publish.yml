name: Docker Publish

on:
  push:
    branches: [ "main" ]

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize Gradle wrapper line endings
        run: sed -i 's/\r$//' gradlew && chmod +x gradlew

      - name: Validate Docker Hub secrets
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "DOCKERHUB_USERNAME is empty. Set it as a repository secret or repository variable."
            exit 1
          fi
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DOCKERHUB_TOKEN secret is empty or unavailable."
            exit 1
          fi
          echo "Docker Hub secrets are available."

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push payment-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: payment-service/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/fcfs-payment-service:latest

      - name: Build and push draw-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: draw-service/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/fcfs-draw-service:latest
