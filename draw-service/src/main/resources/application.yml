spring:
  application:
    name: draw-service
  datasource:
    url: jdbc:h2:mem:drawservice;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  charset:
    console: UTF-8
    file: UTF-8

draw:
  redis:
    address: ${REDIS_ADDRESS:redis://localhost:6379}
  payment:
    base-url: ${PAYMENT_BASE_URL:http://localhost:8080}
  metrics:
    refresh-delay-ms: 5000
