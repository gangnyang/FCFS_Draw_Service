spring:
  datasource:
    url: jdbc:h2:mem:drawservice-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  task:
    scheduling:
      enabled: false

logging:
  charset:
    console: UTF-8
    file: UTF-8

draw:
  queue:
    worker:
      enabled: false
  redis:
    address: redis://localhost:6379
  payment:
    base-url: http://localhost:8080
