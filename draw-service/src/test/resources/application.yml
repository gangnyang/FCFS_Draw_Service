spring:
  datasource:
    url: jdbc:h2:mem:drawservice-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

logging:
  charset:
    console: UTF-8
    file: UTF-8

draw:
  redis:
    address: redis://localhost:6379
